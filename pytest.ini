# =====================================================
# pytest configuration
# =====================================================
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    slow: tests lents (réseau, base de données)
    integration: tests d'intégration (nécessitent PostgreSQL/Ollama)
    adversarial: tests adversariaux anti-injection de prompt
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

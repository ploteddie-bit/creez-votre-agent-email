# =====================================================
# Alembic — configuration pour email-learner
# =====================================================
[alembic]
# Chemin du répertoire des migrations
script_location = alembic

# Template utilisé pour générer les nouvelles révisions
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# timezone pour les timestamps
timezone = UTC

# Longueur max de l'identifiant de révision
truncate_slug_length = 40

# Active la sortie verbeuse
verbosity = 1

# Marquer les nouvelles révisions comme "autogenerate" (True/False)
revision_environment = false

# SQL à exécuter au début de chaque migration (si besoin)
# sourceless = false

# Version_path_separator = os
# sqlalchemy.url = postgresql://user:pass@localhost/dbname

# =====================================================
# [post_write_hooks] — pour black + isort après génération
# =====================================================
[post_write_hooks]
hooks = isort
isort.type = console_scripts
isort.entrypoint = isort
isort.options = -RC --treat-comment-as-code "# -*- isort: -*-"

# =====================================================
# [loggers] — configuration du logging
# =====================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
